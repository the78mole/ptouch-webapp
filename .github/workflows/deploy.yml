# Deploy to GitHub Pages (Actions-based, not branch-based)
#
# Prerequisites (one-time, in repo Settings → Pages):
#   Source: "GitHub Actions"
#
# This workflow builds the Vite SPA and publishes the dist/ folder via the
# official GitHub Pages deployment pipeline (configure-pages →
# upload-pages-artifact → deploy-pages).
#
# Triggers:
#   • Push to main branch
#   • Manual run via GitHub UI (Actions → "Deploy to GitHub Pages" → Run workflow)

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Allow only one concurrent deployment; cancel any in-progress run so the
# latest push always wins.
concurrency:
  group: pages
  cancel-in-progress: true

# Grant the GITHUB_TOKEN the minimum permissions needed by deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build with Vite
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the entire dist/ output directory
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest

    # Expose the deployment URL as a job output
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}

    # Required for the Pages deployment environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
