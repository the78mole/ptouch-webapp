<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Browser-based label designer for Brother PT-E560BTVP via Web Bluetooth" />
  <title>P-Touch Label Designer</title>
  <script type="module" crossorigin src="/assets/index-BVjzOWOd.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-BlYvEWQn.css">
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen antialiased font-sans">

  <!-- ─── Header ─────────────────────────────────────────────────── -->
  <header class="sticky top-0 z-20 bg-zinc-900/90 backdrop-blur border-b border-zinc-800
                 px-4 py-3 flex items-center justify-between gap-4">
    <div class="flex items-center gap-2 min-w-0">
      <!-- Printer icon -->
      <svg class="w-6 h-6 shrink-0 text-blue-400" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="1.75"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M6 9V3h12v6"/>
        <rect x="3" y="9" width="18" height="9" rx="2"/>
        <path d="M6 18v3h12v-3"/>
        <circle cx="17.5" cy="13.5" r="1"/>
      </svg>
      <h1 class="text-base font-semibold truncate">P-Touch Label Designer</h1>
    </div>

    <div class="flex items-center gap-3 shrink-0">
      <!-- Connection status indicator -->
      <div class="hidden sm:flex items-center gap-2">
        <span id="status-dot"
              class="status-dot bg-red-500 w-2.5 h-2.5 rounded-full shrink-0"
              aria-hidden="true"></span>
        <span id="status-text" class="text-xs text-zinc-400 tabular-nums">Disconnected</span>
      </div>

      <button id="connect-btn"
              class="px-3 py-1.5 text-sm font-medium rounded-lg
                     bg-blue-600 hover:bg-blue-700 active:bg-blue-800
                     text-white transition-colors focus-visible:outline-2
                     focus-visible:outline-blue-400">
        Connect Printer
      </button>
    </div>
  </header>

  <!-- ─── Main ───────────────────────────────────────────────────── -->
  <main class="max-w-3xl mx-auto px-4 py-6 space-y-5">

    <!-- Live Preview -->
    <section class="bg-zinc-900 rounded-2xl border border-zinc-800 p-4">
      <p class="text-xs font-medium text-zinc-500 uppercase tracking-widest mb-3">Live Preview</p>

      <div id="preview-area"
           class="flex items-center justify-center bg-zinc-800 rounded-xl
                  min-h-28 p-3 overflow-x-auto">
        <!-- Yellow tape outline wrapper -->
        <div id="preview-tape"
             class="relative border-2 border-yellow-600/70 rounded bg-yellow-50
                    shadow-inner inline-block p-0.5 max-w-full overflow-hidden">
          <canvas id="preview-canvas" aria-label="Label preview"></canvas>
        </div>
      </div>

      <!-- Tape scale hint -->
      <p class="text-xs text-zinc-600 text-right mt-1.5" id="scale-info"></p>
    </section>

    <!-- Design + Settings grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">

      <!-- Label Content -->
      <section class="bg-zinc-900 rounded-2xl border border-zinc-800 p-4 space-y-4">
        <p class="text-xs font-medium text-zinc-500 uppercase tracking-widest">Label Content</p>

        <!-- Text input -->
        <div class="space-y-1">
          <label for="label-text" class="text-xs text-zinc-400">Text</label>
          <textarea id="label-text"
                    class="w-full bg-zinc-800 border border-zinc-700 rounded-lg
                           px-3 py-2 text-sm text-zinc-100 font-mono
                           placeholder-zinc-600 resize-none
                           focus:outline-none focus:ring-2 focus:ring-blue-500"
                    rows="3"
                    placeholder="Enter label text…&#10;(newlines supported)">P-Touch Label</textarea>
        </div>

        <!-- Font size -->
        <div class="space-y-1">
          <div class="flex justify-between text-xs text-zinc-400">
            <label for="font-size">Font Size</label>
            <span id="font-size-value" class="font-mono text-blue-400">36px</span>
          </div>
          <input id="font-size" type="range" min="8" max="110" value="36"
                 class="w-full accent-blue-500 cursor-pointer" />
        </div>

        <!-- Bold toggle -->
        <div class="flex items-center justify-between">
          <span class="text-sm text-zinc-300">Bold</span>
          <label class="flex items-center gap-0">
            <input id="bold-toggle" type="checkbox" class="toggle-input sr-only" />
            <span class="toggle-track" aria-hidden="true"></span>
          </label>
        </div>
      </section>

      <!-- Tape & Print Settings -->
      <section class="bg-zinc-900 rounded-2xl border border-zinc-800 p-4 space-y-4">
        <p class="text-xs font-medium text-zinc-500 uppercase tracking-widest">Tape &amp; Print</p>

        <!-- Tape width -->
        <div class="space-y-2">
          <p class="text-xs text-zinc-400">Tape Width</p>
          <div class="grid grid-cols-3 gap-2">
            <label class="tape-pill relative">
              <input type="radio" name="tape-size" value="12" />
              <span>12 mm</span>
            </label>
            <label class="tape-pill relative">
              <input type="radio" name="tape-size" value="18" />
              <span>18 mm</span>
            </label>
            <label class="tape-pill relative">
              <input type="radio" name="tape-size" value="24" checked />
              <span>24 mm</span>
            </label>
          </div>
        </div>

        <!-- Half-cut toggle -->
        <div class="flex items-start justify-between gap-3">
          <div>
            <p class="text-sm text-zinc-300 leading-tight">Half-Cut Between Labels</p>
            <p class="text-xs text-zinc-600 mt-0.5">Partial cut for easy tear-off</p>
          </div>
          <label class="flex items-center gap-0 mt-0.5 shrink-0">
            <input id="half-cut" type="checkbox" class="toggle-input sr-only" />
            <span class="toggle-track" aria-hidden="true"></span>
          </label>
        </div>

        <!-- Chain printing toggle -->
        <div class="flex items-start justify-between gap-3">
          <div>
            <p class="text-sm text-zinc-300 leading-tight">Chain Printing</p>
            <p class="text-xs text-zinc-600 mt-0.5">Minimise tape waste between copies</p>
          </div>
          <label class="flex items-center gap-0 mt-0.5 shrink-0">
            <input id="chain-print" type="checkbox" class="toggle-input sr-only" />
            <span class="toggle-track" aria-hidden="true"></span>
          </label>
        </div>

        <!-- Copies -->
        <div class="space-y-1">
          <p class="text-xs text-zinc-400">Copies</p>
          <div class="flex items-center gap-2">
            <button id="copies-dec"
                    class="w-9 h-9 rounded-lg border border-zinc-700 bg-zinc-800
                           text-zinc-300 hover:bg-zinc-700 text-xl leading-none
                           flex items-center justify-center transition-colors"
                    aria-label="Decrease copies">−</button>
            <input id="copies" type="number" min="1" max="99" value="1"
                   class="w-16 text-center bg-zinc-800 border border-zinc-700 rounded-lg
                          py-1.5 text-zinc-100 text-sm tabular-nums
                          focus:outline-none focus:ring-2 focus:ring-blue-500" />
            <button id="copies-inc"
                    class="w-9 h-9 rounded-lg border border-zinc-700 bg-zinc-800
                           text-zinc-300 hover:bg-zinc-700 text-xl leading-none
                           flex items-center justify-center transition-colors"
                    aria-label="Increase copies">+</button>
          </div>
        </div>
      </section>
    </div>

    <!-- Print Actions -->
    <section class="bg-zinc-900 rounded-2xl border border-zinc-800 p-4 space-y-3">
      <div class="flex flex-col sm:flex-row gap-3">
        <button id="print-btn" disabled
                class="flex-1 py-3 px-6 rounded-xl font-semibold text-sm text-white
                       bg-blue-600 hover:bg-blue-700 active:bg-blue-800
                       disabled:opacity-40 disabled:cursor-not-allowed
                       transition-all shadow-lg focus-visible:outline-2
                       focus-visible:outline-blue-400">
          🖨 Print Label
        </button>
        <button id="finalize-btn" disabled
                class="py-3 px-5 rounded-xl font-medium text-sm text-zinc-300
                       bg-zinc-800 hover:bg-zinc-700 border border-zinc-700
                       disabled:opacity-40 disabled:cursor-not-allowed
                       transition-all focus-visible:outline-2
                       focus-visible:outline-zinc-500"
                title="Send eject command to finish a chain-print series">
          ✂ Finalize Series
        </button>
      </div>

      <p class="text-xs text-zinc-600 text-center">
        Web Bluetooth requires <strong class="text-zinc-500">HTTPS</strong> or
        <code class="text-zinc-500">localhost</code> and a compatible Chromium browser.
      </p>
    </section>

  </main>

  <!-- Hidden render canvas (used for rasterization, never shown) -->
  <canvas id="render-canvas" class="hidden" aria-hidden="true"></canvas>

</body>
</html>
